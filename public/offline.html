<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBook — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e1a;
      color: #f0f4ff;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    .container { text-align: center; padding: 2rem; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p { color: #8892b0; margin-bottom: 1.5rem; }
    a { color: #6366f1; text-decoration: none; padding: 10px 24px; border: 1px solid #6366f1; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✈️</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Your cached bookings are still available.</p>
    <a href="/my-bookings">View My Bookings</a>
  </div>
</body>
</html>
